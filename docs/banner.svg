<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0d12"/>
      <stop offset="1" stop-color="#161b24"/>
    </linearGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5b8def"/>
      <stop offset="1" stop-color="#3ec28f"/>
    </linearGradient>
    <linearGradient id="rxgrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3ec28f" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3ec28f" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="txgrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5a623" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="900" cy="40" r="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5b8def" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#5b8def" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#glow)"/>

  <!-- Subtle grid -->
  <g stroke="#1f2532" stroke-width="1" opacity="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
  </g>

  <!-- Background bandwidth chart silhouette -->
  <path d="M0,260 L60,250 L120,235 L180,220 L240,225 L300,205 L360,195 L420,200 L480,170 L540,180 L600,150 L660,160 L720,135 L780,145 L840,120 L900,110 L960,125 L1020,95 L1080,105 L1140,80 L1200,70 L1200,320 L0,320 Z" fill="url(#rxgrad)"/>
  <path d="M0,260 L60,250 L120,235 L180,220 L240,225 L300,205 L360,195 L420,200 L480,170 L540,180 L600,150 L660,160 L720,135 L780,145 L840,120 L900,110 L960,125 L1020,95 L1080,105 L1140,80 L1200,70" stroke="#3ec28f" stroke-width="2" fill="none" opacity="0.7"/>

  <path d="M0,290 L60,285 L120,288 L180,282 L240,290 L300,278 L360,285 L420,275 L480,290 L540,280 L600,272 L660,285 L720,278 L780,288 L840,275 L900,282 L960,272 L1020,285 L1080,275 L1140,288 L1200,278 L1200,320 L0,320 Z" fill="url(#txgrad)"/>
  <path d="M0,290 L60,285 L120,288 L180,282 L240,290 L300,278 L360,285 L420,275 L480,290 L540,280 L600,272 L660,285 L720,278 L780,288 L840,275 L900,282 L960,272 L1020,285 L1080,275 L1140,288 L1200,278" stroke="#f5a623" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Logo + title -->
  <g transform="translate(80, 100)">
    <rect width="80" height="80" rx="18" fill="url(#logo)"/>
    <text x="40" y="56" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="48" fill="white">P</text>
  </g>

  <text x="190" y="135" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="56" fill="#e6e9ef" letter-spacing="-1.5">PortSleuth</text>
  <text x="190" y="170" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="18" fill="#9aa3b2">Real-time per-port network monitoring · eBPF-powered · single binary</text>

  <!-- Stat chips -->
  <g transform="translate(190, 200)" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13">
    <g>
      <rect x="0" y="0" width="155" height="34" rx="8" fill="#11151c" stroke="#2a3142"/>
      <circle cx="14" cy="17" r="4" fill="#3ec28f"/>
      <text x="26" y="22" fill="#9aa3b2">RX</text>
      <text x="50" y="22" fill="#3ec28f" font-weight="600">2.4 MB/s</text>
    </g>
    <g transform="translate(165, 0)">
      <rect x="0" y="0" width="155" height="34" rx="8" fill="#11151c" stroke="#2a3142"/>
      <circle cx="14" cy="17" r="4" fill="#f5a623"/>
      <text x="26" y="22" fill="#9aa3b2">TX</text>
      <text x="50" y="22" fill="#f5a623" font-weight="600">812 KB/s</text>
    </g>
    <g transform="translate(330, 0)">
      <rect x="0" y="0" width="135" height="34" rx="8" fill="#11151c" stroke="#2a3142"/>
      <text x="14" y="22" fill="#9aa3b2">conns</text>
      <text x="60" y="22" fill="#e6e9ef" font-weight="600">147</text>
    </g>
    <g transform="translate(475, 0)">
      <rect x="0" y="0" width="135" height="34" rx="8" fill="#11151c" stroke="#2a3142"/>
      <text x="14" y="22" fill="#9aa3b2">listen</text>
      <text x="62" y="22" fill="#e6e9ef" font-weight="600">14</text>
    </g>
  </g>

  <!-- Tech badges in top right -->
  <g transform="translate(900, 50)" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">
    <g>
      <rect width="60" height="22" rx="11" fill="rgba(91,141,239,0.12)" stroke="rgba(91,141,239,0.3)"/>
      <text x="30" y="15" text-anchor="middle" fill="#7aa5ff">Go 1.23</text>
    </g>
    <g transform="translate(70, 0)">
      <rect width="56" height="22" rx="11" fill="rgba(91,141,239,0.12)" stroke="rgba(91,141,239,0.3)"/>
      <text x="28" y="15" text-anchor="middle" fill="#7aa5ff">React</text>
    </g>
    <g transform="translate(136, 0)">
      <rect width="50" height="22" rx="11" fill="rgba(62,194,143,0.12)" stroke="rgba(62,194,143,0.3)"/>
      <text x="25" y="15" text-anchor="middle" fill="#3ec28f">eBPF</text>
    </g>
    <g transform="translate(196, 0)">
      <rect width="42" height="22" rx="11" fill="rgba(245,166,35,0.12)" stroke="rgba(245,166,35,0.3)"/>
      <text x="21" y="15" text-anchor="middle" fill="#f5a623">MIT</text>
    </g>
  </g>
</svg>
